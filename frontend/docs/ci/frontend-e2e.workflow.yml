# Copy this file to: .github/workflows/frontend-e2e.yml
# (GitHub web UI → Add file, or git push with a PAT that has the "workflow" scope.)
#
# Playwright smoke against local preview (no prod secrets required).
name: frontend-e2e

on:
  push:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-e2e.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-e2e.yml'

jobs:
  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run build
      - run: npm run test:e2e
        env:
          CI: true
          E2E_LOGIN_EMAIL: ${{ secrets.E2E_LOGIN_EMAIL }}
          E2E_LOGIN_PASSWORD: ${{ secrets.E2E_LOGIN_PASSWORD }}
