name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: gymerviet
          POSTGRES_PASSWORD: gymerviet123
          POSTGRES_DB: gymerviet
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gymerviet -d gymerviet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      NODE_ENV: test
      PORT: 3001
      DATABASE_URL: postgresql://gymerviet:gymerviet123@localhost:5432/gymerviet
      JWT_SECRET: test_jwt_secret_min_32_chars_value
      JWT_REFRESH_SECRET: test_refresh_secret_min_32_chars_value
      JWT_ACCESS_EXPIRES_IN: 10m
      JWT_REFRESH_EXPIRES_IN: 7d
      JWT_REFRESH_TTL_SECONDS: 604800
      FRONTEND_URL: http://localhost:5173
      ALLOWED_ORIGINS: http://localhost:5173,https://gymerviet.com,https://www.gymerviet.com
      REDIS_URL: redis://localhost:6379
      SMTP_HOST: smtp.test.local
      SMTP_PORT: 587
      SMTP_USER: test-user
      SMTP_PASS: test-pass
      SMTP_FROM: GYMERVIET <noreply@gymerviet.com>
      SEPAY_WEBHOOK_SECRET: test-sepay-secret
      RUN_SEED: false
      SKIP_RATE_LIMIT: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Run SQL migrations
        run: npm run migrate:run

      - name: Check migration state
        run: npm run migrate:check

      - name: Lint backend
        run: npm run lint

      - name: Test backend
        run: npm test -- --runInBand

      - name: Build backend
        run: npm run build

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend CI bundle
        run: npm run build:ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Desktop smoke
        run: npx playwright test e2e/smoke.spec.ts --project=chromium

      - name: Mobile smoke
        run: npx playwright test e2e/mobile-interactions.spec.ts --project=mobile-chrome --project=mobile-safari
